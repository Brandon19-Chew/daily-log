name: Daily Auto Commit

on:
  schedule:
    - cron: "0 1 * * *"   # runs daily (UTC)
  workflow_dispatch:

jobs:
  commit:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Update file
        run: |
          echo "Auto update: $(date)" >> daily.txt

      - name: Commit changes
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add .
          git commit -m "Daily auto update" || exit 0
          git push
