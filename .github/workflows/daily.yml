name: Daily Auto Commit
on:
  schedule:
    - cron: "0 17 * * *"  # 1:00 AM UTC+8 (Malaysia Time)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  commit:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Update file
        run: |
          echo "Auto update: $(date +'%Y-%m-%d %H:%M:%S')" >> daily.txt

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "Brandon19-Chew@users.noreply.github.com"
          git add daily.txt
          git commit -m "Daily auto update" || echo "No changes to commit"
          git push origin main
