name: Daily Auto Commit

on:
  schedule:
    - cron: "0 1 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main  # ⬅️ explicit branch
          
      - name: Update file
        run: |
          echo "Auto update: $(date +'%Y-%m-%d %H:%M:%S')" >> daily.txt
          
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "Brandon19-Chew@users.noreply.github.com"  # ← your specific email
          git add daily.txt
          git commit -m "Daily auto update" || echo "No changes to commit"
          git push origin main  # ⬅️ explicit push
